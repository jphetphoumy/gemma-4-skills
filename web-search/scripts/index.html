<!DOCTYPE html>
<html lang="en">
<head></head>

<body>
    <script>
        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                const jsonData = JSON.parse(data);
                const results = await webSearch(jsonData.query);

                return JSON.stringify({
                    result: results
                });
            } catch (e) {
                console.error(e);
                return JSON.stringify({
                    error: `Failed: ${e.message}`
                });
            }
        };

        async function webSearch(query) {
            const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`HTTP error: ${response.status}`);
            }

            const data = await response.json();
            const sections = [];

            if (data.AbstractText) {
                sections.push(`**Summary**\n${data.AbstractText}\nSource: ${data.AbstractURL}`);
            }

            if (data.Answer) {
                sections.push(`**Answer**\n${data.Answer}`);
            }

            const topics = (data.RelatedTopics || [])
                .filter(t => t.Text && t.FirstURL)
                .slice(0, 5)
                .map(t => `- [${t.Text}](${t.FirstURL})`);

            if (topics.length > 0) {
                sections.push(`**Related Topics**\n${topics.join('\n')}`);
            }

            if (sections.length === 0) {
                return `No results found for "${query}". Try rephrasing your search.`;
            }

            return sections.join('\n\n');
        }
    </script>
</body>

</html>
